    <meta name="viewport" content="width=device-width, initial-scale=1" />

        display: flex;
        align-items: center;
        justify-content: center;
      }

      .signup-card {
        width: 380px;
        padding: 30px;
        background-color: #ffffff;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      }

      .form-control {
        border-radius: 50px;
        background-color: #f5f5f7;
        border: none;
      }

      .form-control:focus {
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(150, 150, 255, 0.2);
      }

      .logo {
        display: block;
        margin: 0 auto 10px auto;
      }

  <body>

    <div class="signup-card">

      <img src="logopawm.png" alt="Logo" width="60" height="60" class="logo">

      <h3 class="text-center fw-light mb-4">Create your Pawm account</h3>

      <form>

        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="username" placeholder="Username" required>
          <label for="username">Username</label>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="Email" required>
          <label for="email">Email address</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <label for="password">Password</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
          <label for="confirmPassword">Confirm Password</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 rounded-pill">
          Sign Up
        </button>
      </form>

      <p class="text-center mt-3 text-muted">
        Already have an account?
        <a href="login.html" class="text-decoration-none">Login</a>
      </p>
    </div>

  </body>
